<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 · Page not found</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #07071a;
    color: #f4f4ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    padding: 24px;
    text-align: center;
  }
  .wrap { max-width: 520px; }
  h1 {
    font-size: clamp(3.5rem, 14vw, 7rem);
    font-weight: 900;
    margin: 0 0 12px;
    background: linear-gradient(135deg, #c084fc 0%, #6366f1 40%, #06b6d4 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    letter-spacing: -0.04em;
  }
  p { color: #c8cae0; margin: 0 0 28px; font-size: 1.1rem; }
  a {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 12px;
    background: linear-gradient(135deg, #c084fc 0%, #6366f1 40%, #06b6d4 100%);
    color: #0a0a1a;
    font-weight: 600;
    text-decoration: none;
  }
  a:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist — but my GitHub repos definitely do.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
